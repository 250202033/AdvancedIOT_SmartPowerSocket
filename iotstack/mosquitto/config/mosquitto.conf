# --- General Config ---
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# Save the in-memory database to disk every 60 seconds
autosave_interval 60

# --- Default Listener (No SSL) ---
# Use this for Node-RED or internal services on the same machine
listener 1883
allow_anonymous true

# --- Secure Listener (mTLS) ---
# Use this for your ESP32
listener 8883
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key

# Force the ESP32 to provide its own certificate
require_certificate true

# Optional: Uses the 'Common Name' in the ESP32 cert as the MQTT username
use_identity_as_username true
